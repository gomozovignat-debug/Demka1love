<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Иллюзия</title>

<style>
    body {
        margin: 0;
        background: black;
        font-family: Arial, sans-serif;
    }

    .scene {
        height: 80vh;
        margin-top: 10vh;
        margin-bottom: 10vh;
        background: white;
        position: relative;
    }

    /* УВЕЛИЧЕННЫЙ текст сверху */
    .hint {
        position: absolute;
        top: 15px;
        left: 15px;
        font-size: 20px; /* было 14px */
        font-weight: bold;
        color: black;
    }

    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    .dot {
        font-size: 30px;
        color: black;
    }

    .ghost-text {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: black;
        opacity: 0;
        transition: opacity 5s linear;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="scene">

    <div class="hint">
        смотри на точку чтобы увидеть иллюзию
    </div>

    <div class="ghost-text" id="ghost">
        Я тебя ненавижу.
    </div>

    <div class="center">
        <div class="dot" id="dot">•</div>
    </div>

</div>

<script>
    setTimeout(() => {
        const text = document.getElementById("ghost");

        // Плавное появление
        text.style.opacity = "0.1";

        setTimeout(() => {
            // ❗ УБИРАЕМ анимацию перед скрытием
            text.style.transition = "none";
            text.style.opacity = "0";

            // Меняем точку сразу
            document.getElementById("dot").innerText = "я люблю тебя";

        }, 5000);

    }, 15000);
</script>

</body>
</html>

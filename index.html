<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Иллюзия</title>

<style>
    body {
        margin: 0;
        background: white;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    /* Заголовок сверху */
    .hint {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 14px;
        color: black;
    }

    /* Центр */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    /* Точка */
    .dot {
        font-size: 40px;
        color: black;
    }

    /* Фоновый текст */
    .hidden-text {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 60px;
        color: black;
        opacity: 0;
        transition: opacity 5s linear;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="hint">
    смотри на точку чтобы увидеть иллюзию
</div>

<div class="hidden-text" id="hateText">
    Я тебя ненавижу.
</div>

<div class="center">
    <div class="dot" id="dot">•</div>
</div>

<script>
    // через 15 секунд
    setTimeout(() => {
        const text = document.getElementById("hateText");

        // Появление до ~25%
        text.style.opacity = "0.25";

        // Через 5 секунд скрываем
        setTimeout(() => {
            text.style.opacity = "0";

            // После исчезновения меняем точку
            setTimeout(() => {
                document.getElementById("dot").innerText = "я люблю тебя";
            }, 1000);

        }, 5000);

    }, 15000);
</script>

</body>
</html>

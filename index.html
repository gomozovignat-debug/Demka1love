<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Иллюзия</title>

<style>
    body {
        margin: 0;
        background: black;
        font-family: Arial, sans-serif;
    }

    /* Белая зона с чёрными полосами сверху/снизу */
    .scene {
        height: 80vh; /* ключ — работает и на телефоне */
        margin-top: 10vh;
        margin-bottom: 10vh;
        background: white;
        position: relative;
    }

    /* Текст сверху */
    .hint {
        position: absolute;
        top: 15px;
        left: 15px;
        font-size: 14px;
        color: black;
    }

    /* Центр */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    /* Точка */
    .dot {
        font-size: 30px;
        color: black;
    }

    /* Слабый текст */
    .ghost-text {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: black;
        opacity: 0;
        transition: opacity 5s linear;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="scene">

    <div class="hint">
        смотри на точку чтобы увидеть иллюзию
    </div>

    <div class="ghost-text" id="ghost">
        Я тебя ненавижу.
    </div>

    <div class="center">
        <div class="dot" id="dot">•</div>
    </div>

</div>

<script>
    // через 15 секунд
    setTimeout(() => {
        const text = document.getElementById("ghost");

        // Плавное появление до 10%
        text.style.opacity = "0.1";

        // Через 5 секунд — одновременно:
        setTimeout(() => {
            // исчезает текст
            text.style.opacity = "0";

            // И сразу же меняется точка
            document.getElementById("dot").innerText = "я люблю тебя";

        }, 5000);

    }, 15000);
</script>

</body>
</html>
